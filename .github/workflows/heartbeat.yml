name: Nehira Heartbeat (Autopilot)

on:
  schedule:
    # Har 30 minute mein chalega
    - cron: '*/30 * * * *'
  workflow_dispatch: # Ye button allow karta hai manual run ke liye

jobs:
  wake_up_nehira:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Nehira Manager (Builder Brain)
        run: |
          curl -X POST https://nehira.space/api/manager \
          -H "Content-Type: application/json" \
          -d '{"task": "AUTOPILOT", "prompt": "Wake up"}'

