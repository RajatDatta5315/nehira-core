name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # Manually trigger karne ke liye
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # 👇 APNA HUGGING FACE USERNAME AUR SPACE NAME YAHAN LIKH
          # Example: rajat9/nehira-brain
          HF_USERNAME: "TERA_HF_USERNAME" 
          HF_SPACE_NAME: "TERA_SPACE_NAME"
        run: |
          git config --global user.email "bot@kryv.network"
          git config --global user.name "KRYV Bot"
          git remote add space https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          git push --force space main
